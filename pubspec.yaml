name: speechup
description: "SpeechUp - Ứng dụng luyện nói thông minh"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  google_fonts: ^6.2.1
  fl_chart: ^0.70.2
  provider: ^6.1.2
  confetti: ^0.8.0
  firebase_core: ^3.13.0
  firebase_auth: ^5.6.0
  google_sign_in: ^6.2.2
  cloud_firestore: ^5.6.7
  shared_preferences: ^2.5.3
  speech_to_text: ^7.0.0
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  intl: ^0.20.2
  http: ^1.5.0
  audioplayers: ^6.5.0
  flutter_tts: ^4.2.5
  record: ^6.2.0
  firebase_messaging: ^15.2.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/onboarding_welcome_hero.png
    - assets/audio/score_pickup.wav
